name: sciedu-local

services:
  backend:
    build:
      context: ../../
      dockerfile: .deploy/local/Dockerfile
    container_name: sciedu-backend-local
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - ENV=local
      - DEBUG=true
      - HOST=0.0.0.0
      - PORT=8080
      - DATABASE_URL=postgres://postgres:password@postgres:5432/sciedu?sslmode=disable
      - MIGRATION_SOURCE=file:///app/migrations
      - ALLOW_ORIGINS=*.sciedu.sdc.nycu.club,http://localhost:5173
    networks:
      - sciedu-local

  postgres:
    image: postgres:18.1
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: sciedu
    volumes:
      - postgres_data:/var/lib/postgresql
    networks:
      - sciedu-local

volumes:
  postgres_data:
    driver: local

networks:
  sciedu-local:
    driver: bridge
