name: sciedu-dev

services:
  backend:
    image: "nycusdc/sciedu-backend:dev"
    networks:
      - internal
      - traefik
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - ENV=dev
      - ENVIRONMENT=dev
      - HOST=0.0.0.0
      - PORT=8080
      - BASE_URL=https://dev.sciedu.sdc.nycu.club
      - DATABASE_URL=postgres://postgres:password@postgres:5432/sciedu?sslmode=disable
      - MIGRATION_SOURCE=file:///app/migrations
      - LLM_URL=https://llm.dev.sciedu.sdc.nycu.club
      - GOOGLE_OAUTH_REDIRECT_URL=https://dev.sciedu.sdc.nycu.club/api/auth/callback
      - AUTH_REDIRECT_ALLOWLIST=https://dev.sciedu.sdc.nycu.club,http://localhost:8080,http://localhost:5173
      - ALLOW_ORIGINS=*.sciedu.sdc.nycu.club,http://localhost:5173
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.sciedu-backend-dev.rule=Host(`dev.sciedu.sdc.nycu.club`) && PathPrefix(`/api`)"
      - "traefik.http.routers.sciedu-backend-dev.entrypoints=websecure"
      - "traefik.http.routers.sciedu-backend-dev.tls=true"
      - "traefik.http.routers.sciedu-backend-dev.tls.certresolver=cloudflare"
      - "traefik.http.services.sciedu-backend-dev.loadbalancer.server.port=8080"
      - "vector.enable=true"

  postgres:
    image: postgres:18.1
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: sciedu
    networks:
      - internal

networks:
  internal:
  traefik:
    external: true
