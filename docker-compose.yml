services:
  postgres:
    image: postgres:18.1
    container_name: sciedu-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: sciedu
    ports:
      - "5432:5432"
    volumes:
      - sciedu-postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sciedu"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  sciedu-postgres-data:
